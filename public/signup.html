<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickSend | Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="signup-body">
    <main class="signup-page">
      <section class="signup-card">
          <div class="signup-hero">
            <img class="signup-logo" src="/quicksend-logo.svg" alt="QuickSend logo" />
            <h1>Get Started</h1>
          </div>

          <form id="signupForm" class="signup-form" novalidate>
            <label class="signup-input">
              <input id="nameInput" name="name" type="text" placeholder="Full Name" autocomplete="name" required />
            </label>

            <label class="signup-input">
              <input
                id="contactInput"
                name="contact"
                type="text"
                inputmode="numeric"
                maxlength="10"
                placeholder="Phone Number"
                autocomplete="tel"
                required
              />
            </label>

            <label class="signup-input">
              <input id="emailInput" name="email" type="email" placeholder="Email" autocomplete="email" required />
            </label>

            <label class="signup-input">
              <input
                id="passwordInput"
                name="password"
                type="password"
                placeholder="Password"
                autocomplete="new-password"
                required
              />
            </label>

            <label class="signup-input">
              <input
                id="confirmPasswordInput"
                name="confirmPassword"
                type="password"
                placeholder="Confirm Password"
                autocomplete="new-password"
                required
              />
            </label>

            <p class="signup-note">Already have an account? <a href="/login.html">Login</a></p>

            <div id="signupStatus" class="signup-status" aria-live="polite"></div>

            <button class="signup-submit" type="submit">Next</button>
          </form>
      </section>
    </main>

    <script src="/topnav.js"></script>
    <script src="/signup.js"></script>
  </body>
</html>
