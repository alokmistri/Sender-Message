<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | MessageFlow</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-body">
    <div class="admin-shell">
      <section class="admin-login-card">
        <div class="admin-login-copy">
          <p class="eyebrow">Admin Portal</p>
          <h1>Control the message business</h1>
          <p class="hero-copy">Use the separate admin portal to monitor revenue, wallet credits, message traffic, and internal profit data.</p>
        </div>

        <div class="auth-card admin-auth-card">
          <div class="auth-card-header">
            <p class="auth-kicker">Separate Admin Website</p>
            <h3>Admin login</h3>
          </div>

          <form id="adminLoginForm" class="auth-form">
            <label for="adminEmailInput">Admin Email</label>
            <input id="adminEmailInput" type="email" placeholder="admin@messageflow.local" autocomplete="username" required />

            <label for="adminPasswordInput">Password</label>
            <input id="adminPasswordInput" type="password" placeholder="Enter admin password" autocomplete="current-password" required />

            <button class="primary-btn" type="submit">Login to Admin</button>
          </form>

          <div id="adminLoginStatus" class="status-box" aria-live="polite"></div>
        </div>
      </section>
    </div>

    <script src="/admin-login.js"></script>
  </body>
</html>
