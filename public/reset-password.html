<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickSend | Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="reset-body">
    <main class="reset-page">
      <section class="reset-card">
        <div class="reset-hero">
          <div class="reset-badge" aria-hidden="true">Q</div>
          <h1>Reset Password</h1>
          <p>Create a new password for your QuickSend account.</p>
        </div>

        <form id="resetPasswordForm" class="reset-form" novalidate>
          <label class="reset-input">
            <input
              id="resetPasswordInput"
              name="password"
              type="password"
              placeholder="New Password"
              autocomplete="new-password"
              required
            />
          </label>

          <label class="reset-input">
            <input
              id="resetConfirmPasswordInput"
              name="confirmPassword"
              type="password"
              placeholder="Confirm Password"
              autocomplete="new-password"
              required
            />
          </label>

          <div class="reset-rules">
            Minimum 8 characters, include 1 number and 1 special character. `_` and `-` are not allowed.
          </div>

          <div id="resetPasswordStatus" class="reset-status" aria-live="polite"></div>

          <button class="reset-submit" type="submit">Reset Password</button>
        </form>
      </section>
    </main>

    <script src="/topnav.js"></script>
    <script src="/reset-password.js"></script>
  </body>
</html>
