<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickSend | Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="forgot-body">
    <main class="forgot-page">
      <section class="forgot-card">
        <div class="forgot-hero">
          <div class="forgot-badge" aria-hidden="true">Q</div>
          <h1>Forgot Password</h1>
          <p>Enter your email or contact number. We’ll send a reset link to your registered email.</p>
        </div>

        <form id="forgotPasswordForm" class="forgot-form" novalidate>
          <label class="forgot-input">
            <input
              id="forgotCredentialInput"
              name="credential"
              type="text"
              placeholder="Enter your Email or Contact Number"
              autocomplete="username"
              required
            />
          </label>

          <div id="forgotPasswordStatus" class="forgot-status" aria-live="polite"></div>

          <button class="forgot-submit" type="submit">Send Reset Link</button>
        </form>

        <p class="forgot-note">Remember your password? <a href="/login.html">Back to Login</a></p>
      </section>
    </main>

    <script src="/topnav.js"></script>
    <script src="/forgot-password.js"></script>
  </body>
</html>
